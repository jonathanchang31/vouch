<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}vouch review{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="masthead">
    <div class="brand">
      <span class="brand-mark">▌</span>
      <span class="brand-text">vouch · review console</span>
    </div>
    <nav class="nav">
      <a href="/" {% if active == "queue" %}aria-current="page"{% endif %}>queue</a>
      <a href="/audit" {% if active == "audit" %}aria-current="page"{% endif %}>audit</a>
    </nav>
  </header>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
  <footer class="colophon">
    <span>localhost-only · v0.1 mvp · approves via plain form POST</span>
  </footer>
</body>
</html>
