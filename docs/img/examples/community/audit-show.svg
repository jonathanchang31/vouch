<text x="16" y="192" fill="#c9d1d9" xml:space="preserve">  id: vouchdev-vouch-issue-168-critical-agent-transport-allows-cro</text>
<text x="16" y="212" fill="#c9d1d9" xml:space="preserve">  text: 'vouchdev/vouch issue #168 (critical: agent transport allows cross-agent approval)</text>
<text x="16" y="232" fill="#c9d1d9" xml:space="preserve">    is still unfixed on both main and test: kb.approve/kb.reject are registered on</text>
<text x="16" y="252" fill="#c9d1d9" xml:space="preserve">    the JSONL transport with no expose_decision_tools trust gate, and the only check</text>
<text x="16" y="272" fill="#c9d1d9" xml:space="preserve">    is same-agent self-approval. A prior fix (PR #169) was closed unmerged after a</text>
<text x="16" y="292" fill="#c9d1d9" xml:space="preserve">    maintainer requested changes: remove the duplicated handle_request guard whose</text>
<text x="16" y="312" fill="#c9d1d9" xml:space="preserve">    broad except-Exception swallows real errors, and document or remove the undocumented</text>
<text x="16" y="332" fill="#c9d1d9" xml:space="preserve">    approver_role: trusted-agent bypass.'</text>
<text x="16" y="352" fill="#c9d1d9" xml:space="preserve">  type: fact</text>
<text x="16" y="372" fill="#c9d1d9" xml:space="preserve">  confidence: 0.95</text>
