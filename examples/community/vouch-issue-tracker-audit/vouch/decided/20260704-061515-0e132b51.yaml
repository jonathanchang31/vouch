  text: 'vouchdev/vouch issue #168 (critical: agent transport allows cross-agent approval)
    is still unfixed on both main and test: kb.approve/kb.reject are registered on
    the JSONL transport with no expose_decision_tools trust gate, and the only check
    is same-agent self-approval. A prior fix (PR #169) was closed unmerged after a
