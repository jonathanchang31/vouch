payload:
  id: vouchdev-vouch-s-cli-vouch-source-add-path-url-url-silently-
  text: 'vouchdev/vouch''s CLI: ''vouch source add PATH --url URL'' silently drops
    --url. cli.py::source_add always passes an explicit locator=str(Path(path).resolve())
    into store.put_source(), and storage.py''s locator=locator or url or title or
    sid never falls through to url as a result. Found while building this very KB:
    every source below had to have its locator hand-corrected post-hoc from a local
    scratch path to its real GitHub URL.'
  type: fact
  confidence: 0.95
  evidence:
