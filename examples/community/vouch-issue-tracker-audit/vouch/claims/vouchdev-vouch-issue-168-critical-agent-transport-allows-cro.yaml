id: vouchdev-vouch-issue-168-critical-agent-transport-allows-cro
text: 'vouchdev/vouch issue #168 (critical: agent transport allows cross-agent approval)
  is still unfixed on both main and test: kb.approve/kb.reject are registered on the
  JSONL transport with no expose_decision_tools trust gate, and the only check is
  same-agent self-approval. A prior fix (PR #169) was closed unmerged after a maintainer
  requested changes: remove the duplicated handle_request guard whose broad except-Exception
  swallows real errors, and document or remove the undocumented approver_role: trusted-agent
  bypass.'
